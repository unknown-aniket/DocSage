version: "3.9"

services:
  api:
    build: .
    container_name: rag_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./database:/app/database
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build: .
    container_name: rag_frontend
    command: streamlit run app/frontend.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE=http://api:8000/api/v1
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./database:/app/database
      - ./uploads:/app/uploads
    restart: unless-stopped

volumes:
  db_data:
